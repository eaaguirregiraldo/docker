name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: laravel-jwt-app
  ECS_CONTAINER_NAME: laravel-jwt-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Validate required deployment secrets
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail
          missing=0
          for v in APP_KEY APP_URL DB_HOST DB_PORT DB_DATABASE DB_USERNAME DB_PASSWORD JWT_SECRET; do
            if [ -z "${!v}" ]; then
              echo "Missing required secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Configure required secrets in GitHub Actions before deploy."
            exit 1
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            APP_ENV=production
            APP_DEBUG=false
            APP_KEY=${{ secrets.APP_KEY }}
            APP_URL=${{ secrets.APP_URL }}
            LOG_CHANNEL=stderr
            DB_CONNECTION=mysql
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}

      - name: Deploy to Amazon ECS
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Read ECS network config
        id: ecs-config
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVICE }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'services[0].taskDefinition' \
            --output text)
          SUBNETS=$(aws ecs describe-services \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVICE }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' \
            --output json | jq -r 'join(",")')
          SECURITY_GROUPS=$(aws ecs describe-services \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVICE }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' \
            --output json | jq -r 'join(",")')
          echo "task_def_arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"
          echo "subnets=$SUBNETS" >> "$GITHUB_OUTPUT"
          echo "security_groups=$SECURITY_GROUPS" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        run: |
          set -euo pipefail
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --launch-type FARGATE \
            --task-definition "${{ steps.ecs-config.outputs.task_def_arn }}" \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.ecs-config.outputs.subnets }}],securityGroups=[${{ steps.ecs-config.outputs.security_groups }}],assignPublicIp=ENABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"${{ env.ECS_CONTAINER_NAME }}\",\"command\":[\"php\",\"artisan\",\"migrate\",\"--force\"]}]}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'tasks[0].taskArn' \
            --output text)
          aws ecs wait tasks-stopped \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --region "${{ env.AWS_REGION }}"
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --region "${{ env.AWS_REGION }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            aws ecs describe-tasks \
              --cluster "${{ secrets.ECS_CLUSTER }}" \
              --tasks "$TASK_ARN" \
              --region "${{ env.AWS_REGION }}" \
              --query 'tasks[0].{stoppedReason:stoppedReason,container:containers[0]}'
            exit 1
          fi
